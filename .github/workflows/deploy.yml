name: CD - Deploy

on:
  push:
    branches:
      - develop
      - staging
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: us-east-1

jobs:
  # ==========================================
  # Determine Environment
  # ==========================================
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/staging" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # Build
  # ==========================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies - claims
        working-directory: src/claims
        run: npm install --omit=dev

      - name: Install dependencies - documents
        working-directory: src/documents
        run: npm install --omit=dev

      - name: SAM Build
        run: sam build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sam-build-${{ needs.setup.outputs.environment }}
          path: .aws-sam/
          retention-days: 1

  # ==========================================
  # Deploy to Dev (automatic)
  # ==========================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'dev'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build-dev
          path: .aws-sam/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy SAM stack
        run: sam deploy --config-env dev --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Get stack outputs
        id: outputs
        run: |
          STACK_OUTPUTS=$(aws cloudformation describe-stacks --stack-name siniestros-dev --query 'Stacks[0].Outputs' --output json)
          echo "outputs=$STACK_OUTPUTS" >> $GITHUB_OUTPUT
          echo "## Deploy Dev - Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$STACK_OUTPUTS" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Deploy to Staging (automatic)
  # ==========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build-staging
          path: .aws-sam/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy SAM stack
        run: sam deploy --config-env staging --no-confirm-changeset --no-fail-on-empty-changeset

      - name: Run integration tests
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name siniestros-staging --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' --output text)
          echo "Testing API at: $API_URL"
          # Health check
          curl -sf "$API_URL/api/v1/claims/health" || echo "Health endpoint not implemented yet"

  # ==========================================
  # Deploy to Prod (manual approval required)
  # ==========================================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'prod'
    environment: 
      name: prod
      # GitHub Environment protection rules handle the manual approval
    steps:
      - uses: actions/checkout@v4

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sam-build-prod
          path: .aws-sam/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy SAM stack (Canary)
        run: sam deploy --config-env prod --no-fail-on-empty-changeset

      - name: Monitor canary deployment
        run: |
          echo "Monitoring canary deployment for 5 minutes..."
          echo "CodeDeploy will automatically rollback if ClaimsErrorAlarm triggers"
          sleep 30
          # Check if deployment is still in progress
          aws cloudformation describe-stacks --stack-name siniestros-prod --query 'Stacks[0].StackStatus' --output text

      - name: Get production outputs
        run: |
          STACK_OUTPUTS=$(aws cloudformation describe-stacks --stack-name siniestros-prod --query 'Stacks[0].Outputs' --output json)
          echo "## Production Deploy - Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$STACK_OUTPUTS" | jq '.' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Deploy Frontend (S3 + CloudFront invalidation)
  # ==========================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [setup, build, deploy-dev, deploy-staging, deploy-prod]
    if: always() && (needs.deploy-dev.result == 'success' || needs.deploy-staging.result == 'success' || needs.deploy-prod.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        continue-on-error: true

      - name: Deploy to S3
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          BUCKET=$(aws cloudformation describe-stacks --stack-name siniestros-$ENV --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' --output text)
          aws s3 sync frontend/dist/ s3://$BUCKET/ --delete
        continue-on-error: true

      - name: Invalidate CloudFront cache
        run: |
          ENV=${{ needs.setup.outputs.environment }}
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name siniestros-$ENV --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' --output text)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
        continue-on-error: true
